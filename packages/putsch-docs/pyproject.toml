[build-system]
requires = ["hatchling>=1.27"]
build-backend = "hatchling.build"

[project]
name = "putsch-docs"
version = "0.1.0"
description = "Production-grade document/OCR layer for the Putsch AP Crew. Docling + Granite-Docling primary, Qwen2.5-VL-72B fallback."
readme = "README.md"
license = { text = "Proprietary" }
requires-python = ">=3.11"
authors = [{ name = "Putsch Group Platform Engineering" }]
keywords = ["docling", "ocr", "invoice", "german", "gdpr", "agentic"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Financial and Insurance Industry",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Office/Business :: Financial :: Accounting",
]

dependencies = [
    # Document layer
    "docling>=2.20.0",
    "docling-core>=2.20.0",
    # Schema + validation
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.4",
    "python-stdnum>=1.20",         # IBAN MOD-97, USt-IdNr, German tax number
    "schwifty>=2024.6.1",          # IBAN validation, BIC derivation
    # Async + resilience
    "anyio>=4.4",
    "tenacity>=8.5",
    "purgatory>=3.0",              # asyncio circuit breaker
    "httpx>=0.27",
    # LLM gateway
    "litellm>=1.50",
    "dspy-ai>=2.5",
    # Observability
    "structlog>=24.4",
    "langfuse>=2.50",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
    # CrewAI bridge
    "crewai>=0.80",
    "crewai-tools>=0.14",
    # MCP server bridge
    "mcp>=1.0",
    # Image preprocessing for VLM fallback
    "Pillow>=10.4",
    "pypdfium2>=4.30",
]

[project.optional-dependencies]
dev = [
    "mypy>=1.11",
    "ruff>=0.6",
    "pytest>=8.3",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "pytest-benchmark>=4.0",
    "hypothesis>=6.112",
    "respx>=0.21",
    "freezegun>=1.5",
]
gpu = [
    "vllm>=0.6.3",
    "torch>=2.4",
]

[project.scripts]
putsch-docs-eval = "putsch_docs.scripts.eval:main"
putsch-docs-mcp = "putsch_docs.mcp_server:main"

[tool.hatch.build.targets.wheel]
packages = ["src/putsch_docs"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_any_unimported = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
check_untyped_defs = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["docling.*", "docling_core.*", "crewai.*", "crewai_tools.*", "dspy.*", "langfuse.*", "mcp.*", "purgatory.*", "schwifty.*", "stdnum.*", "pypdfium2.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests"]

[tool.ruff.lint]
select = [
    "E", "F", "W",      # pycodestyle / pyflakes
    "I",                # isort
    "B",                # bugbear
    "UP",               # pyupgrade
    "ANN",              # type annotations
    "ASYNC",            # async-correctness
    "S",                # bandit
    "A",                # shadowing builtins
    "C4",               # comprehensions
    "DTZ",              # naive datetime
    "PIE",
    "PL",               # pylint
    "RUF",
]
ignore = [
    "ANN401",   # Any allowed in specific bridge code (CrewAI, MCP, DSPy)
    "PLR0913",  # too many arguments — extraction functions need them
    "S101",     # assert allowed in tests
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["S101", "ANN", "PLR2004"]
"scripts/**" = ["S101"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "-ra --strict-markers --strict-config --cov=putsch_docs --cov-report=term-missing"
markers = [
    "slow: marks tests that run real model inference (deselect with '-m \"not slow\"')",
    "integration: integration tests that require docker-compose stack",
    "performance: p99 latency budget tests",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "@overload",
]
