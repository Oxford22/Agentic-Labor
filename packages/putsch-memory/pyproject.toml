[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "putsch-memory"
version = "0.1.0"
description = "Temporal knowledge graph memory backbone for the Putsch agentic stack (Zep + Graphiti on Neo4j, Frankfurt-hosted)."
readme = "README.md"
requires-python = ">=3.11,<3.13"
license = { file = "LICENSE" }
authors = [
    { name = "Putsch Platform Engineering" },
]
keywords = ["agents", "memory", "knowledge-graph", "temporal", "graphiti", "neo4j", "gdpr", "eu-ai-act"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Information Technology",
    "License :: OSI Approved :: Apache Software License",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Database",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
]
dependencies = [
    "graphiti-core>=0.3.0",
    "neo4j>=5.20.0",
    "pydantic>=2.6.0",
    "pydantic-settings>=2.2.0",
    "structlog>=24.1.0",
    "tenacity>=8.2.3",
    "httpx>=0.27.0",
    "anyio>=4.3.0",
    "python-dateutil>=2.9.0",
    "orjson>=3.10.0",
    "cachetools>=5.3.3",
    "asyncstdlib>=3.12.0",
]

[project.optional-dependencies]
crewai = [
    "crewai>=0.51.0",
    "crewai-tools>=0.8.0",
]
langgraph = [
    "langgraph>=0.2.0",
    "langchain-core>=0.3.0",
]
observability = [
    "langfuse>=2.40.0",
    "opentelemetry-api>=1.25.0",
    "opentelemetry-sdk>=1.25.0",
]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=5.0.0",
    "hypothesis>=6.100.0",
    "mypy>=1.10.0",
    "ruff>=0.4.0",
    "freezegun>=1.4.0",
    "respx>=0.21.0",
]

[project.scripts]
putsch-memory-migrate = "putsch_memory.migrations:cli"
putsch-memory-eval    = "putsch_memory.eval.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/putsch_memory"]

[tool.hatch.build.targets.sdist]
include = [
    "src/putsch_memory",
    "README.md",
    "LICENSE",
    "pyproject.toml",
]

# ---------------------------------------------------------------------------
# Tooling
# ---------------------------------------------------------------------------

[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_any_unimported = true
no_implicit_reexport = true
plugins = ["pydantic.mypy"]
exclude = ["tests/fixtures/.*", "deploy/.*"]

[[tool.mypy.overrides]]
module = ["graphiti_core.*", "neo4j.*", "crewai.*", "langgraph.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src"]

[tool.ruff.lint]
select = [
    "E", "F", "W", "I", "B", "UP", "N", "RUF", "ANN", "ASYNC", "S", "C4",
    "PIE", "PL", "PT", "RET", "SIM", "TCH", "TID", "ARG", "ERA", "PD",
    "PERF", "FURB", "LOG", "G", "T20",
]
ignore = [
    "ANN401",  # Allow Any in narrow places — graph values are heterogeneous
    "PLR0913", # Some ingestion fns legitimately take many args
    "S101",    # asserts used in property tests
]
unfixable = ["ERA001"]

[tool.ruff.lint.per-file-ignores]
"tests/**/*.py"            = ["ANN", "PLR2004", "S105", "S106"]
"src/putsch_memory/eval/**" = ["PLR2004"]

[tool.pytest.ini_options]
minversion = "8.0"
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = [
    "-ra",
    "--strict-markers",
    "--strict-config",
    "--showlocals",
    "--cov=putsch_memory",
    "--cov-report=term-missing:skip-covered",
    "--cov-fail-under=85",
]
markers = [
    "integration: requires a live Neo4j instance",
    "chaos: chaos-engineering tests, may stop containers",
    "slow: slow tests, deselect with -m 'not slow'",
]
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:neo4j.*",
    "ignore::DeprecationWarning:graphiti_core.*",
]
