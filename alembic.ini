# Alembic config for the putsch-compile registry.
#
# Production runs:  alembic upgrade head
# Generate a new migration after a model change:
#   alembic revision --autogenerate -m "describe change"
#
# The DSN is read from the PUTSCH_COMPILE_DB_DSN environment variable at runtime by env.py —
# we deliberately do NOT pin sqlalchemy.url here so the same migration set runs against dev,
# staging, and prod without config edits.

[alembic]
script_location = alembic
prepend_sys_path = src
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
timezone = UTC
truncate_slug_length = 40
revision_environment = false
sourceless = false

[post_write_hooks]
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
