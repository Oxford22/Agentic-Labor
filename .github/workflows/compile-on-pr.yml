name: compile-on-pr

on:
  pull_request:
    paths:
      - "src/putsch_compile/signatures/**"
      - "evals/datasets/**"
      - "src/putsch_compile/metrics.py"
      - "src/putsch_compile/routing.py"
      - ".github/workflows/compile-on-pr.yml"

permissions:
  contents: read
  pull-requests: write

jobs:
  validate-and-eval:
    name: validate datasets, run signature contract tests, eval affected
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    env:
      PUTSCH_COMPILE_LITELLM_PROXY_BASE_URL: "http://localhost:0"
      PUTSCH_COMPILE_LANGFUSE_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # we diff against the base to know which signatures changed

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint + type-check
        run: |
          ruff check src tests
          mypy --strict src/putsch_compile

      - name: Validate dataset schemas
        run: putsch-compile validate-datasets

      - name: Signature contract tests
        run: pytest tests/test_signatures_contract.py -v

      - name: Determine affected signatures
        id: affected
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          changed=$(git diff --name-only "$base"...HEAD | grep -E '^(evals/datasets/|src/putsch_compile/signatures/)' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          # extract bare signature names
          names=$(echo "$changed" | sed -E 's@.*/([a-z_]+)\.(jsonl|py)@\1@' | sort -u | grep -v '^_base$' | grep -v '^__init__$' || true)
          echo "names=$names" >> "$GITHUB_OUTPUT"

      - name: Run regression eval on affected signatures
        if: steps.affected.outputs.names != ''
        run: |
          for name in ${{ steps.affected.outputs.names }}; do
            echo "::group::eval $name"
            pytest tests/test_regression.py -k "$name" -v
            echo "::endgroup::"
          done

      - name: Optimizer integration smoke test
        run: pytest tests/test_optimizer_integration.py -v -m "not integration"

      - name: Comment on PR with affected list
        if: steps.affected.outputs.names != ''
        uses: actions/github-script@v7
        with:
          script: |
            const names = `${{ steps.affected.outputs.names }}`.split(/\s+/).filter(Boolean);
            if (!names.length) return;
            const body = [
              "### compile-on-pr report",
              "",
              "Affected signatures (eval gated, >2% regression blocks merge):",
              ...names.map(n => `- \`${n}\``),
            ].join("\n");
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
