repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: check-json
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-merge-conflict
      - id: check-added-large-files
        args: [--maxkb=512]

  - repo: local
    hooks:
      - id: forbidden-deps
        name: forbidden-deps (Anthropic / OpenAI in production paths)
        entry: python scripts/check_forbidden_deps.py
        language: system
        pass_filenames: false
        files: pyproject\.toml$
      - id: workflow-residency
        name: workflow-residency (EU regions + no :latest)
        entry: python scripts/check_workflow_residency.py
        language: system
        pass_filenames: false
        files: ^(\.github/workflows/|deploy/|.*docker-compose).*\.(yml|yaml|tf)$
