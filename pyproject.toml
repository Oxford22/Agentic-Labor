[build-system]
requires = ["hatchling>=1.21"]
build-backend = "hatchling.build"

[project]
name = "putsch-compile"
version = "0.1.0"
description = "Compiled-prompts + model-routing + continuous-optimization layer for Putsch Group agent stack (DSPy + GEPA + BAML)."
readme = "README.md"
license = { file = "LICENSE" }
requires-python = ">=3.11"
authors = [{ name = "Putsch Group — Agentic Platform", email = "agentic-platform@putsch.example" }]
keywords = ["dspy", "gepa", "baml", "compiled-prompts", "model-routing", "agentic", "gdpr"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "Operating System :: POSIX :: Linux",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

dependencies = [
    "dspy-ai>=2.5.20",
    "litellm>=1.52.0",
    "pydantic>=2.7,<3",
    "pydantic-settings>=2.4",
    "structlog>=24.1",
    "orjson>=3.10",
    "httpx>=0.27",
    "sqlalchemy[asyncio]>=2.0.30",
    "asyncpg>=0.29",
    "alembic>=1.13",
    "aioboto3>=13.0",
    "langfuse>=2.50",
    "click>=8.1",
    "tenacity>=8.5",
    "python-ulid>=2.7",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "pytest-asyncio>=0.23",
    "pytest-cov>=5.0",
    "pytest-mock>=3.14",
    "mypy>=1.11",
    "ruff>=0.6",
    "types-PyYAML",
    "freezegun>=1.5",
    "respx>=0.21",
]

[project.scripts]
putsch-compile = "putsch_compile.cli:main"

[project.urls]
Documentation = "https://internal.putsch.example/docs/agentic-platform"
Source = "https://github.com/putschgroup/agentic-platform"

[tool.hatch.build.targets.wheel]
packages = ["src/putsch_compile"]

# -----------------------------------------------------------------------------
# Type checking — strict.
# -----------------------------------------------------------------------------
[tool.mypy]
python_version = "3.11"
strict = true
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
disallow_any_generics = true
disallow_untyped_decorators = true
no_implicit_reexport = true
plugins = ["pydantic.mypy"]

[[tool.mypy.overrides]]
module = ["dspy.*", "litellm.*", "langfuse.*", "aioboto3.*", "boto3.*", "ulid.*"]
ignore_missing_imports = true

[tool.pydantic-mypy]
init_forbid_extra = true
init_typed = true
warn_required_dynamic_aliases = true

# -----------------------------------------------------------------------------
# Lint / format.
# -----------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"
src = ["src", "tests", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "C4", "SIM", "ARG", "RUF", "TID", "PL", "PERF"]
ignore = ["PLR0913"]  # many keyword-only constructor args by design in signatures

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["PLR2004", "ARG001"]
"scripts/*" = ["T201"]

# -----------------------------------------------------------------------------
# Tests.
# -----------------------------------------------------------------------------
[tool.pytest.ini_options]
minversion = "8.0"
addopts = "-ra --strict-markers --strict-config -q"
testpaths = ["tests"]
markers = [
    "integration: hits a live model (skipped in unit CI)",
    "golden: compares against versioned compiled artifact",
    "slow: optimization runs",
]
asyncio_mode = "auto"
filterwarnings = [
    "error",
    "ignore::DeprecationWarning:dspy.*",
    "ignore::DeprecationWarning:litellm.*",
]

[tool.coverage.run]
branch = true
source = ["src/putsch_compile"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
]
